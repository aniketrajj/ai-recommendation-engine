
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Recommendations</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; margin-top: 50px; }
        .search-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 50px; }
        input[type="text"] { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        /* Keeping grid styles in case you want to show the general catalog below */
        .catalog-title { text-align: center; color: #333; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; background-color: #eaeaea; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .category { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 18px; margin: 10px 0; color: #333; text-transform: capitalize; }
        .price-rating { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-weight: bold; color: #28a745; font-size: 18px; }
        .rating { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 12px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome to Our Store</h1>
        <p>Enter your User ID to log in and see your personalized recommendations.</p>
    </div>

    <form class="search-bar" action="/user_recommendations" method="GET">
        <input type="text" name="user_id" placeholder="Enter User ID (e.g., U102)" required>
        <button type="submit"> Get Recommendations</button>
    </form>

    <h2 class="catalog-title" id="sectionTitle">General Catalog</h2>
    <div class="grid" id="productGrid"></div>

    <script>
        // Use your exact same imageMap and categoryMap here
        const imageMap = { 'sunglasses': 'https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400&q=80', 'rice': 'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400&q=80', 'smartwatch': 'https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?w=400&q=80', 'powerbank': 'https://images.unsplash.com/photo-1609091839311-d5365f9ff1c5?w=400&q=80', 'shampoo': 'https://images.unsplash.com/photo-1631729371254-42c2892f0e6e?w=400&q=80', 'perfume': 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400&q=80', 'jacket': 'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80', 'detergent': 'https://images.unsplash.com/photo-1584824486516-0555a07fc511?w=400&q=80', 'wheat-flour': 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400&q=80', 'sneakers': 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80', 'tshirt': 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80', 'oil': 'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400&q=80', 'headphones': 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80', 'jeans': 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&q=80', 'watch': 'https://images.unsplash.com/photo-1524592094714-a57e67d41382?w=400&q=80' };
        const categoryMap = { 'luxury': 'https://images.unsplash.com/photo-1518136247453-74e7b5265980?w=400&q=80', 'electronics': 'https://images.unsplash.com/photo-1498049794561-7780e7231661?w=400&q=80', 'fashion': 'https://images.unsplash.com/photo-1445205170230-053b83016050?w=400&q=80', 'grocery': 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80', 'daily_essential': 'https://images.unsplash.com/photo-1628102491629-77858ab5721d?w=400&q=80', 'default': 'https://images.unsplash.com/photo-1580870058445-ea3bbec5935b?w=400&q=80' };

        window.onload = () => {
            fetch('/api/products')
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        const grid = document.getElementById('productGrid');
                        data.data.forEach(product => {
                            let imgUrl = imageMap[product.pr_label] || categoryMap[product.pr_category] || categoryMap['default'];
                            const titleText = product.pr_label !== 'missing' ? product.pr_label.replace('-', ' ') : 'Premium ' + product.pr_category;
                            grid.innerHTML += `
                                <div class="card">
                                    <img src="${imgUrl}" alt="${titleText}">
                                    <div class="card-content">
                                        <span class="category">${product.pr_category.replace('_', ' ')} | ${product.pr_id}</span>
                                        <h3 class="title">${titleText}</h3>
                                        <div class="price-rating">
                                            <span class="price">₹${product.pr_cost}</span>
                                            <span class="rating">★ ${product.pr_rating}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                });
        };
    </script>
</body>
</html>
